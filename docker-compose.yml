version: "3.9"

services:
  # --- Infrastructure ---

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # --- Hub ---

  hub:
    build: .
    ports:
      - "8000:8000"
    environment:
      STORAGE_BACKEND: memory
      QDRANT_URL: http://qdrant:6333
      NEO4J_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      HUB_HOST: "0.0.0.0"
      HUB_PORT: "8000"
    depends_on:
      - qdrant
      - neo4j
    restart: unless-stopped

  # --- Agents ---

  researcher:
    build: .
    command: ["python", "-m", "agents.run_agent", "--role", "researcher", "--port", "9001", "--name", "researcher"]
    ports:
      - "9001:9001"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - hub
    restart: unless-stopped

  engineer:
    build: .
    command: ["python", "-m", "agents.run_agent", "--role", "engineer", "--port", "9002", "--name", "engineer"]
    ports:
      - "9002:9002"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - hub
    restart: unless-stopped

  critic:
    build: .
    command: ["python", "-m", "agents.run_agent", "--role", "critic", "--port", "9003", "--name", "critic"]
    ports:
      - "9003:9003"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      - hub
    restart: unless-stopped

volumes:
  qdrant_data:
  neo4j_data:
